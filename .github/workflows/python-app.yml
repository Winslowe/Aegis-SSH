name: Aegis-SSH Otomatik Kalite Kontrolü

# Her kod gönderdiğinde bu sistem otomatik çalışır
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Python 3.10 Kuruluyor
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Bağımlılıklar Yükleniyor
      run: |
        python -m pip install --upgrade pip
        pip install asyncssh colorama
        
    - name: Kod Hata Kontrolü (Linting)
      run: |
        pip install flake8
        # Kodda kritik bir hata varsa sistem burada uyarı verir
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
